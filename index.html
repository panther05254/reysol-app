  .header { background: var(--card); border-bottom: 3px solid var(--y); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }

  .header-sub { font-size: 10px; color: #888; letter-spacing: 1px; }

  .banner-row { display: flex; align-items: center; justify-content: space-between; }

  .banner-team-sub { font-size: 11px; color: #aaa; margin-bottom: 3px; }
  .banner-vs { font-family: 'Bebas Neue'; font-size: 28px; color: #fff; letter-spacing: 2px; text-align: center; }
  .banner-date { font-size: 10px; color: #888; text-align: center; }
  .banner-btns { display: flex; gap: 6px; margin-top: 10px; }
  .banner-btn { flex: 1; border-radius: 8px; padding: 7px; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; }
  .banner-btn-y { background: var(--y); color: #1a1a1a; }
  .banner-btn-ghost { border: 1px solid #ffffff22; color: #fff; }

  /* TAB BAR */
  .tabbar { display: flex; gap: 6px; padding: 6px 16px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 14px 14px 80px; overscroll-behavior: contain; }
  .content.webview-mode { padding: 0; overflow: hidden; }

  /* BOTTOM NAV */
  .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; background: #111; border-top: 2px solid color-mix(in srgb, var(--y) 20%, transparent); display: flex; padding: 8px 0 env(safe-area-inset-bottom, 10px); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; background: none; border: none; font-family: 'Noto Sans JP'; }

  .nav-label { font-size: 10px; color: #555; }
  .nav-item.active .nav-label { color: var(--y); font-weight: 700; }

  .card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .card.hot { border-color: color-mix(in srgb, var(--y) 27%, transparent); }

  .venue-text { color: #555; font-size: 10px; margin-top: 6px; text-align: center; }

  /* BBS WEBVIEW */
  .webview-container { display: flex; flex-direction: column; height: 100%; }
  .webview-header { display: flex; align-items: center; padding: 10px 16px; background: var(--card); border-bottom: 1px solid color-mix(in srgb, var(--y) 20%, transparent); gap: 8px; flex-shrink: 0; }

  .page-btn { border-radius: 16px; padding: 5px 16px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid; font-family: 'Noto Sans JP'; }
  .page-btn.active { background: color-mix(in srgb, var(--y) 13%, transparent); border-color: color-mix(in srgb, var(--y) 33%, transparent); color: var(--y); }
  .page-btn.disabled { background: var(--card); border-color: #2a2a2a; color: #444; cursor: default; }
  .page-num { color: #666; font-size: 12px; }
  .bbs-iframe { flex: 1; border: none; width: 100%; background: var(--bg); }
  .action-btn { border: 1px solid; border-radius: 8px; padding: 5px 10px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP'; background: none; }
  .reload-btn { border-color: color-mix(in srgb, var(--y) 40%, transparent); color: var(--y); background: color-mix(in srgb, var(--y) 9%, transparent); }
  .reload-btn:disabled { border-color: #333; color: #444; background: var(--card2); cursor: default; }
  .post-btn { border-color: color-mix(in srgb, var(--y) 27%, transparent); color: var(--y); background: color-mix(in srgb, var(--y) 7%, transparent); }

  /* STANDINGS */
  .standings-table { background: var(--card); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .standings-head { display: grid; grid-template-columns: 24px 1fr 28px 28px 28px 28px 30px 36px; gap: 4px; padding: 10px 12px; background: var(--card2); font-size: 10px; color: #666; font-weight: 700; border-bottom: 1px solid #2a2a2a; }
  .standings-row { display: grid; grid-template-columns: 24px 1fr 28px 28px 28px 28px 30px 36px; gap: 4px; padding: 11px 12px; align-items: center; border-bottom: 1px solid #222; }
  .standings-row:last-child { border-bottom: none; }
  .standings-row.reysol { background: color-mix(in srgb, var(--y) 8%, transparent); }
  .sc { font-size: 12px; text-align: center; color: #888; }
  .sc.pos { color: #666; font-weight: 700; }
  .sc.pos.top { color: var(--y); }
  .sc.team { text-align: left; color: #ddd; font-size: 12px; }
  .sc.team.reysol { color: var(--y); font-weight: 700; }
  .sc.win { color: #4caf50; }
  .sc.lose { color: #f44336; }
  .sc.pts { font-weight: 700; color: #fff; }
  .sc.pts.reysol { color: var(--y); }

  /* ANIMATION */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fadeIn 0.2s ease both; }
</style>

<script>
const Y = '#FFD700';

// в”Җв”Җ DATA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// matches гҒЁ standings гҒҜAPIеҸ–еҫ—гҒ§еӢ•зҡ„гҒ«иЁӯе®ҡ
let matches = [];
let standings = [];
let matchesLoading = false;
let standingsLoading = false;
let matchesError = false;
let standingsError = false;

const API_KEY = '37a095f37b3be013ccb82836dc2cb33a';
const KASHIWA_ID = 2323;
const J1_LEAGUE_ID = 98;
const SEASON = 2026;

// гғҒгғјгғ еҗҚгҒ®ж—Ҙжң¬иӘһеӨүжҸӣгғһгғғгғ—
const TEAM_JP = {
  'Kashiwa Reysol': 'жҹҸгғ¬гӮӨгӮҪгғ«',
  'Kashima Antlers': 'й№ҝеі¶гӮўгғігғҲгғ©гғјгӮә',
  'FC Tokyo': 'FCжқұдә¬',
  'Tokyo Verdy': 'жқұдә¬гғҙгӮ§гғ«гғҮгӮЈ',
  'Kawasaki Frontale': 'е·қеҙҺгғ•гғӯгғігӮҝгғјгғ¬',
  'Yokohama F.Marinos': 'жЁӘжөңFгғ»гғһгғӘгғҺгӮ№',
  'Yokohama F. Marinos': 'жЁӘжөңFгғ»гғһгғӘгғҺгӮ№',
  'Urawa Red Diamonds': 'жөҰе’Ңгғ¬гғғгӮә',
  'Gamba Osaka': 'гӮ¬гғігғҗеӨ§йҳӘ',
  'Cerezo Osaka': 'гӮ»гғ¬гғғгӮҪеӨ§йҳӘ',
  'Vissel Kobe': 'гғҙгӮЈгғғгӮ»гғ«зҘһжҲё',
  'Sanfrecce Hiroshima': 'гӮөгғігғ•гғ¬гғғгғҒгӮ§еәғеі¶',
  'Nagoya Grampus': 'еҗҚеҸӨеұӢгӮ°гғ©гғігғ‘гӮ№',
  'Sagan Tosu': 'гӮөгӮ¬гғійіҘж –',
  'Shonan Bellmare': 'ж№ҳеҚ—гғҷгғ«гғһгғјгғ¬',
  'Avispa Fukuoka': 'гӮўгғ“гӮ№гғ‘зҰҸеІЎ',
  'Kyoto Sanga FC': 'дә¬йғҪгӮөгғігӮ¬F.C.',
  'Albirex Niigata': 'гӮўгғ«гғ“гғ¬гғғгӮҜгӮ№ж–°жҪҹ',
  'Machida Zelvia': 'FCз”әз”°гӮјгғ«гғ“гӮў',
  'FC Machida Zelvia': 'FCз”әз”°гӮјгғ«гғ“гӮў',
  'Jubilo Iwata': 'гӮёгғҘгғ“гғӯзЈҗз”°',
  'Consadole Sapporo': 'еҢ—жө·йҒ“гӮігғігӮөгғүгғјгғ¬жңӯе№Ң',
  'JEF United Ichihara Chiba': 'гӮёгӮ§гғ•еҚғи‘ү',
  'Mito HollyHock': 'ж°ҙжҲёгғӣгғјгғӘгғјгғӣгғғгӮҜ',
};
function toJP(name) { return TEAM_JP[name] || name; }

function fmtDate(dateStr) {
  const d = new Date(dateStr);
  const days = ['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'];
  return `${d.getFullYear()}е№ҙ${d.getMonth()+1}жңҲ${d.getDate()}ж—Ҙ(${days[d.getDay()]})`;
}
function fmtTime(dateStr) {
  const d = new Date(dateStr);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function fetchMatches() {
  matchesLoading = true;
  matchesError = false;
  if (activeTab === 'matches') render();
  // league IDгҒӘгҒ—гҒ§е…ЁеӨ§дјҡгҒӢгӮүжҹҸгҒ®и©ҰеҗҲгӮ’еҸ–еҫ—пјҲзҷҫе№ҙж§ӢжғігғӘгғјгӮ°еҜҫеҝңпјү
  const urls = [
    `https://v3.football.api-sports.io/fixtures?team=${KASHIWA_ID}&season=${SEASON}`,
  ];
  try {
    let allFixtures = [];
    for (const url of urls) {
      const res = await fetch(url, { headers: { 'x-apisports-key': API_KEY } });
      const data = await res.json();
      console.log('[Reysol] fixtures response:', JSON.stringify(data).slice(0, 500));
      if (data.response && data.response.length > 0) {
        allFixtures = allFixtures.concat(data.response);
      }
    }
    if (allFixtures.length === 0) throw new Error('no data');
    matches = allFixtures
      .sort((a, b) => new Date(b.fixture.date) - new Date(a.fixture.date))
      .map(f => {
        const status = f.fixture.status.short;
        const finished = ['FT','AET','PEN'].includes(status);
        const live = ['1H','2H','ET','HT','P'].includes(status);
        const round = (f.league.round || '').replace('Regular Season - ', '');
        return {
          id: f.fixture.id,
          date: fmtDate(f.fixture.date),
          time: fmtTime(f.fixture.date),
          home: toJP(f.teams.home.name),
          away: toJP(f.teams.away.name),
          homeScore: finished || live ? f.goals.home : null,
          awayScore: finished || live ? f.goals.away : null,
          venue: f.fixture.venue.name || '',
          status: finished ? 'finished' : (live ? 'live' : 'upcoming'),
          competition: round ? `з¬¬${round}зҜҖ` : f.league.name,
          scorers: [],
        };
      });
  } catch(e) {
    console.error('[Reysol] fetchMatches error:', e);
    matchesError = true;
  }
  matchesLoading = false;
  if (activeTab === 'matches') render();
}

async function fetchStandings() {
  standingsLoading = true;
  standingsError = false;
  if (activeTab === 'standings') render();
  try {
    // гҒҫгҒҡleague=98гҒ§и©ҰгҒ—гҖҒгғҖгғЎгҒӘгӮүжҹҸгҒ®жүҖеұһгғӘгғјгӮ°IDгӮ’иҮӘеӢ•жӨңеҮә
    let leagueId = J1_LEAGUE_ID;
    // жҹҸгҒ®жңҖж–°и©ҰеҗҲгҒӢгӮүгғӘгғјгӮ°IDгӮ’еҸ–еҫ—
    if (matches.length > 0 && matches[0].id) {
      const fix = await fetch(
        `https://v3.football.api-sports.io/fixtures?id=${matches[0].id}`,
        { headers: { 'x-apisports-key': API_KEY } }
      );
      const fixData = await fix.json();
      if (fixData.response?.[0]?.league?.id) {
        leagueId = fixData.response[0].league.id;
        console.log('[Reysol] detected league id:', leagueId);
      }
    }
    const res = await fetch(
      `https://v3.football.api-sports.io/standings?league=${leagueId}&season=${SEASON}`,
      { headers: { 'x-apisports-key': API_KEY } }
    );
    const data = await res.json();
    console.log('[Reysol] standings response:', JSON.stringify(data).slice(0, 500));
    const allStandings = data.response?.[0]?.league?.standings;
    // гӮ°гғ«гғјгғ—еҲ¶пјҲжқұиҘҝпјүгҒ®е ҙеҗҲгҒҜжҹҸгҒҢеҗ«гҒҫгӮҢгӮӢгӮ°гғ«гғјгғ—гӮ’йҒёгҒ¶
    let table = null;
    if (allStandings) {
      for (const group of allStandings) {
        if (group.some(t => t.team.name.includes('Kashiwa') || toJP(t.team.name) === 'жҹҸгғ¬гӮӨгӮҪгғ«')) {
          table = group;
          break;
        }
      }
      if (!table) table = allStandings[0];
    }
    if (!table) throw new Error('no standings data');
    standings = table.map(t => ({
      pos: t.rank,
      team: toJP(t.team.name),
      played: t.all.played,
      won: t.all.win,
      draw: t.all.draw,
      lost: t.all.lose,
      gf: t.all.goals.for,
      ga: t.all.goals.against,
      pts: t.points,
    }));
  } catch(e) {
    console.error('[Reysol] fetchStandings error:', e);
    standingsError = true;
  }
  standingsLoading = false;
  if (activeTab === 'standings') render();

const RSS_SOURCES = [
  { url: 'https://www.reysol.co.jp/feed/', source: 'жҹҸгғ¬гӮӨгӮҪгғ«е…¬ејҸ', category: 'гӮҜгғ©гғ–жғ…е ұ', color: '#ff9800' },
  { url: 'https://web.gekisaka.jp/feed/jleague/', source: 'гӮІгӮӯгӮөгӮ«', category: 'и©ҰеҗҲзөҗжһң', color: '#4caf50' },
  { url: 'https://www1.targma.jp/kashiwa/feed/', source: 'жҹҸгғ•гғғгғҲгғңгғјгғ«гӮёгғЈгғјгғҠгғ«', category: 'гғһгғғгғҒгӮігғ©гғ ', color: '#e91e63' },
];

async function fetchRSS() {
  rssLoading = true;
  rssError = false;
  if (activeTab === 'news') render();

  const allItems = [];

  await Promise.all(RSS_SOURCES.map(async (src) => {
    try {
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(src.url)}&api_key=public&count=30`;
      const res = await fetch(apiUrl);
      const data = await res.json();
      if (data.status !== 'ok') return;
      data.items.forEach(item => {
        const text = (item.title + ' ' + (item.description||'')).toLowerCase();
        const isReysol = src.source === 'жҹҸгғ¬гӮӨгӮҪгғ«е…¬ејҸ' || src.source === 'жҹҸгғ•гғғгғҲгғңгғјгғ«гӮёгғЈгғјгғҠгғ«'
          || text.includes('жҹҸ') || text.includes('reysol') || text.includes('гғ¬гӮӨгӮҪгғ«');
        if (!isReysol) return;
        const pubDate = new Date(item.pubDate);
        const dateStr = `${pubDate.getFullYear()}/${String(pubDate.getMonth()+1).padStart(2,'0')}/${String(pubDate.getDate()).padStart(2,'0')}`;
        const summary = (item.description || '').replace(/<[^>]+>/g,'').slice(0, 100);
        allItems.push({
          id: item.link,
          category: src.category,
          color: src.color,
          source: src.source,
          date: dateStr,
          pubDate: pubDate,
          title: item.title,
          summary: summary,
          url: item.link,
          hot: false,
        });
      });
    } catch(e) {}
  }));

  if (allItems.length > 0) {
    allItems.sort((a, b) => b.pubDate - a.pubDate);
    rssNews = allItems.slice(0, 40);
    rssError = false;
  } else {
    rssNews = news;
    rssError = true;
  }

  rssLoading = false;
  if (activeTab === 'news') render();
}

function render() {
  const content = document.getElementById('content');
  renderBanner();
  renderNav();

  if (activeTab === 'board') {
    content.className = 'content webview-mode';
    content.innerHTML = renderBoard();
  } else if (activeTab === 'community') {
    content.className = 'content';
    content.innerHTML = window.renderCommunity ? window.renderCommunity() : '<div id="community-root"></div>';
  } else {
    content.className = 'content';
    if (activeTab === 'news') content.innerHTML = renderNews();
    else if (activeTab === 'matches') content.innerHTML = renderMatches();
    else if (activeTab === 'chant') content.innerHTML = renderChant();
    else if (activeTab === 'standings') content.innerHTML = renderStandings();
  }
}

function setTab(key) {
  activeTab = key;
  window.activeTab = key;
  if (key === 'community') {
    lastReadTs = Date.now();
    window.lastReadTs = lastReadTs;
    localStorage.setItem('reysol_last_read_ts', lastReadTs);
    unreadCount = 0;
    window.unreadCount = 0;
  }
  render();
  document.getElementById('content').scrollTop = 0;
  if (key === 'community') setTimeout(() => { if (window.renderCommunityDOM) window.renderCommunityDOM(); }, 50);
}

function setNewsFilter(cat) {
  newsFilter = cat;
  render();
}

function setChantFilter(f) {
  chantFilter = f;
  render();
}

function toggleMatch(id) {
  expandedMatch = expandedMatch === id ? null : id;

}

function setBBSPage(p) {
  if (p < 1) return;

}

function subscribePosts() {
  if (unsubPosts) return;
  const q = query(ref(db, 'posts'), orderByChild('ts'), limitToLast(50));
  unsubPosts = onValue(q, snap => {
    communityPosts = [];
    snap.forEach(child => {
      communityPosts.unshift({ id: child.key, ...child.val() });
    });
    // гғҲгғјгӮҜгӮҝгғ–йқһиЎЁзӨәдёӯгҒ®гҒҝжңӘиӘӯгӮ«гӮҰгғігғҲжӣҙж–°
    if (window.activeTab !== 'community') {
      window.unreadCount = communityPosts.filter(p => (p.ts || 0) > (window.lastReadTs || 0)).length;
      if (window.renderNav) window.renderNav();
    }
    if (window.activeTab === 'community') renderCommunityDOM();
  });
}

// в”Җв”Җ HELPERS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  if (diff < 60000) return 'гҒҹгҒЈгҒҹд»Ҡ';
  if (diff < 3600000) return `${Math.floor(diff/60000)}еҲҶеүҚ`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}жҷӮй–“еүҚ`;
  return `${Math.floor(diff/86400000)}ж—ҘеүҚ`;
}

function nickColor(nick) {
  let h = 0;
  for (const c of (nick || '?')) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  const hue = h % 360;
  const adj = (hue >= 45 && hue <= 75) ? (hue + 90) % 360 : hue;
  return { bg: `hsl(${adj},65%,42%)`, text: `hsl(${adj},80%,80%)` };
}

let replyingTo = null;
let openReplies = {};

// в”Җв”Җ RENDER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
window.renderCommunity = function() {
  subscribePosts();
  return `<div id="community-root"></div>`;
};

function renderPostCard(p) {
  const liked = (p.likedBy||{})[currentUser?.uid];
  const isOwn = p.uid === currentUser?.uid;
  const replyCount = p.replies ? Object.keys(p.replies).length : 0;
  const repliesOpen = openReplies[p.id];
  const repliesHtml = repliesOpen && p.replies
    ? Object.entries(p.replies).sort((a,b) => (a[1].ts||0)-(b[1].ts||0)).map(([rid, r]) => {
        const isOwnReply = r.uid === currentUser?.uid;
        return `
        <div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #222">
          <div style="width:24px;height:24px;background:${nickColor(r.nick).bg};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:11px;flex-shrink:0">${escapeHtml(r.nick||'?')[0]}</div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
              <span style="color:${nickColor(r.nick).text};font-weight:700;font-size:12px">${escapeHtml(r.nick||'еҢҝеҗҚ')}</span>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="color:#444;font-size:10px">${timeAgo(r.ts)}</span>
                ${isOwnReply ? `<button onclick="window.deleteReply('${p.id}','${rid}')" style="background:none;border:none;color:#555;font-size:13px;cursor:pointer;padding:0;line-height:1;" title="еүҠйҷӨ">рҹ—‘пёҸ</button>` : ''}
              </div>
            </div>
            <div style="color:#ccc;font-size:13px;line-height:1.5;word-break:break-word">${escapeHtml(r.text||'')}</div>
          </div>
        </div>`}).join('')
    : '';

  return `
    <div style="background:var(--card);border-radius:14px;padding:13px 14px;margin-bottom:10px;border:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:30px;height:30px;background:${nickColor(p.nick).bg};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:13px;flex-shrink:0">${escapeHtml(p.nick||'?')[0]}</div>
          <span style="color:${nickColor(p.nick).text};font-weight:700;font-size:13px">${escapeHtml(p.nick||'еҢҝеҗҚ')}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:#444;font-size:11px">${timeAgo(p.ts)}</span>
          ${isOwn ? `<button onclick="window.deletePost('${p.id}')" style="background:none;border:none;color:#555;font-size:15px;cursor:pointer;padding:0;line-height:1;" title="еүҠйҷӨ">рҹ—‘пёҸ</button>` : ''}
        </div>
      </div>
      <div style="color:#ddd;font-size:14px;line-height:1.6;word-break:break-word;margin-bottom:10px">${escapeHtml(p.text||'')}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="window.likePost('${p.id}')" style="background:none;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;color:${liked?'#ff6b6b':'#555'};font-size:12px;cursor:pointer;">
          вқӨпёҸ ${p.likes||0}
        </button>
        <button onclick="window.toggleReplies('${p.id}')" style="background:none;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;color:#555;font-size:12px;cursor:pointer;">
          рҹ’¬ ${replyCount}д»¶гҒ®иҝ”дҝЎ${replyCount>0?(repliesOpen?' в–І':' в–ј'):''}
        </button>
        <button onclick="window.startReply('${p.id}','${escapeHtml(p.nick||'еҢҝеҗҚ')}')" style="background:none;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;color:#888;font-size:12px;cursor:pointer;">
          вҶ© иҝ”дҝЎ
        </button>
      </div>
      ${repliesHtml}
    </div>`;
}

function renderCommunityDOM() {
  window.renderCommunityDOM = renderCommunityDOM;
  const root = document.getElementById('community-root');
  if (!root) return;

  if (!nickname) {
    root.innerHTML = `
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:16px">рҹ’¬</div>
        <div style="color:var(--y);font-weight:900;font-size:20px;margin-bottom:8px">гғҲгғјгӮҜ</div>
        <div style="color:#666;font-size:13px;margin-bottom:28px">гҒ“гҒ®гӮўгғ—гғӘгҒ®гғ•гӮЎгғіеҗҢеЈ«гҒ§дәӨжөҒгҒ§гҒҚгӮӢжҺІзӨәжқҝгҒ§гҒҷгҖӮ<br>гҒҫгҒҡгғӢгғғгӮҜгғҚгғјгғ гӮ’иЁӯе®ҡгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</div>
        <input id="nick-input" type="text" maxlength="12" placeholder="гғӢгғғгӮҜгғҚгғјгғ пјҲ12ж–Үеӯ—д»ҘеҶ…пјү"
          style="width:100%;background:#1e1e1e;border:1px solid #444;border-radius:10px;padding:12px 14px;color:#fff;font-size:15px;font-family:inherit;margin-bottom:12px;outline:none;">
        <button onclick="window.saveNickname()" style="width:100%;background:var(--y);color:#1a1a1a;font-weight:900;font-size:15px;padding:13px;border-radius:12px;border:none;cursor:pointer;font-family:inherit">
          гғҲгғјгӮҜгҒ«еҸӮеҠ гҒҷгӮӢ вҡҪ
        </button>
      </div>`;
    return;
  }

  const replyBanner = replyingTo ? `
    <div style="display:flex;align-items:center;justify-content:space-between;background:#1e1e1e;border:1px solid color-mix(in srgb,var(--y) 30%,transparent);border-radius:10px;padding:8px 12px;margin-bottom:8px">
      <span style="color:var(--y);font-size:12px">вҶ© <b>${escapeHtml(replyingTo.nick)}</b> гҒ•гӮ“гҒёиҝ”дҝЎдёӯ</span>
      <button onclick="window.cancelReply()" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1;">Г—</button>
    </div>` : '';

  root.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <span style="color:var(--y);font-weight:900;font-size:15px">рҹ’¬ гғҲгғјгӮҜ</span>
        <span style="color:#555;font-size:11px;margin-left:8px">${communityPosts.length}д»¶гҒ®жҠ•зЁҝ</span>
      </div>
      <button onclick="window.changeNickname()" style="display:flex;align-items:center;gap:6px;background:none;border:1px solid #333;border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer;font-family:inherit">
        <div style="width:22px;height:22px;background:${nickColor(nickname).bg};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:11px;flex-shrink:0">${escapeHtml(nickname)[0]}</div>
        <span style="color:#888;font-size:11px">${escapeHtml(nickname)}</span>
      </button>
    </div>

    <div style="background:var(--card);border-radius:14px;padding:13px;margin-bottom:14px;border:1px solid color-mix(in srgb,var(--y) 25%,transparent)">
      ${replyBanner}
      <textarea id="post-input" placeholder="${replyingTo ? 'иҝ”дҝЎгӮ’е…ҘеҠӣ...' : 'гғ¬гӮӨгӮҪгғ«гҒ«гҒӨгҒ„гҒҰиӘһгӮҚгҒҶпјҒ'}" maxlength="200"
        style="width:100%;background:#111;border:1px solid #333;border-radius:10px;padding:10px 12px;color:#fff;font-size:14px;font-family:inherit;resize:none;height:70px;outline:none;margin-bottom:10px;"></textarea>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span id="char-count" style="color:#555;font-size:11px">0 / 200</span>
        <button onclick="window.submitPost()" style="background:var(--y);color:#1a1a1a;font-weight:900;font-size:13px;padding:8px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit">
          ${replyingTo ? 'иҝ”дҝЎгҒҷгӮӢ' : 'жҠ•зЁҝгҒҷгӮӢ'}
        </button>
      </div>
    </div>

    ${communityPosts.length === 0
      ? `<div style="text-align:center;padding:32px;color:#444;font-size:13px">гҒҫгҒ жҠ•зЁҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ<br>жңҖеҲқгҒ®жҠ•зЁҝгӮ’гҒ—гҒҰгҒҝгӮҲгҒҶпјҒ</div>`
      : communityPosts.map(p => renderPostCard(p)).join('')}`;

  const ta = document.getElementById('post-input');
  const cc = document.getElementById('char-count');
  if (ta && cc) ta.oninput = () => { cc.textContent = `${ta.value.length} / 200`; };
}

// в”Җв”Җ ACTIONS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
window.saveNickname = function() {
  const val = document.getElementById('nick-input')?.value?.trim();
  if (!val) return;
  nickname = val;
  localStorage.setItem('reysol_nickname', nickname);
  renderCommunityDOM();
};

window.changeNickname = function() {
  if (confirm(`гғӢгғғгӮҜгғҚгғјгғ гӮ’еӨүжӣҙгҒ—гҒҫгҒҷгҒӢпјҹ\nзҸҫеңЁ: ${nickname}`)) {
    nickname = '';
    localStorage.removeItem('reysol_nickname');
    renderCommunityDOM();
  }
};

window.startReply = function(postId, nick) {
  replyingTo = { id: postId, nick };
  openReplies[postId] = true;
  renderCommunityDOM();
  setTimeout(() => document.getElementById('post-input')?.focus(), 80);
};

window.cancelReply = function() {
  replyingTo = null;
  renderCommunityDOM();
};

window.toggleReplies = function(postId) {
  openReplies[postId] = !openReplies[postId];
  renderCommunityDOM();
};

window.submitPost = async function() {
  if (!currentUser) return alert('иӘҚиЁјдёӯгҒ§гҒҷгҖӮгҒ—гҒ°гӮүгҒҸгҒҠеҫ…гҒЎгҒҸгҒ гҒ•гҒ„гҖӮ');
  const ta = document.getElementById('post-input');
  const text = ta?.value?.trim();
  if (!text) return;
  if (text.length > 200) return;
  try {
    if (replyingTo) {
      await push(ref(db, `posts/${replyingTo.id}/replies`), {
        text, nick: nickname,
        uid: currentUser.uid,
        ts: serverTimestamp(),
      });
      openReplies[replyingTo.id] = true;
      replyingTo = null;
    } else {
      await push(ref(db, 'posts'), {
        text, nick: nickname,
        uid: currentUser.uid,
        ts: serverTimestamp(),
        likes: 0, likedBy: {}
      });
    }
    if (ta) ta.value = '';
    const cc = document.getElementById('char-count');
    if (cc) cc.textContent = '0 / 200';
  } catch(e) { alert('жҠ•зЁҝгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮ'); }
};

window.likePost = async function(postId) {
  if (!currentUser) return;
  const post = communityPosts.find(p => p.id === postId);
  if (!post) return;
  const alreadyLiked = (post.likedBy||{})[currentUser.uid];
  await update(ref(db, `posts/${postId}`), {
    likes: increment(alreadyLiked ? -1 : 1),
    [`likedBy/${currentUser.uid}`]: alreadyLiked ? null : true
  });
};

window.deletePost = async function(postId) {
  if (!currentUser) return;
  if (!confirm('гҒ“гҒ®жҠ•зЁҝгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ')) return;
  try {
    await remove(ref(db, `posts/${postId}`));
  } catch(e) { alert('еүҠйҷӨгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮ'); }
};

window.deleteReply = async function(postId, replyId) {
  if (!currentUser) return;
  if (!confirm('гҒ“гҒ®иҝ”дҝЎгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ')) return;
  try {
    await remove(ref(db, `posts/${postId}/replies/${replyId}`));
  } catch(e) { alert('еүҠйҷӨгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮ'); }
};
</script>
