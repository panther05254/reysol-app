function renderChant() {
  const sections = [
    { key:'team',   label:'チームチャント',  icon:'🏆' },
    { key:'player', label:'選手チャント',    icon:'👤' },
    { key:'past',   label:'過去の在籍選手',  icon:'📜' },
  ];
  const items = chantData[chantFilter] || [];
  return `
    <div style="margin-bottom:14px">
      <div style="color:var(--y);font-weight:900;font-size:15px;margin-bottom:10px">🎵 チャント</div>
      <div style="display:flex;gap:6px;margin-bottom:16px">
        ${sections.map(s => `
          <button onclick="setChantFilter('${s.key}')"
            style="flex:1;padding:8px 4px;border-radius:10px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;
              background:${chantFilter===s.key?'var(--y)':'#1e1e1e'};
              color:${chantFilter===s.key?'#1a1a1a':'#888'}">
            ${s.icon}<br>${s.label}
          </button>`).join('')}
      </div>
      <div style="color:#555;font-size:11px;margin-bottom:12px">${items.length}件 · タップで歌詞・動画を確認</div>
    </div>
    ${items.map((c, i) => `
      <a href="${c.url}" target="_blank" style="display:flex;align-items:center;gap:12px;background:var(--card);border-radius:12px;padding:13px 14px;margin-bottom:8px;text-decoration:none;border:1px solid var(--border);" class="fade-in" style="animation-delay:${i*0.03}s">
        <div style="width:36px;height:36px;background:#1e1e1e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🎵</div>
        <div style="flex:1">
          <div style="color:#ddd;font-size:14px;font-weight:700">${c.title}</div>
          <div style="color:#555;font-size:11px;margin-top:2px">reysol-chant.com →</div>
        </div>
        <div style="color:#444;font-size:18px">›</div>
      </a>`).join('')}
    <div style="text-align:center;margin-top:16px;padding-bottom:8px">
      <a href="https://www.reysol-chant.com/" target="_blank" style="color:#555;font-size:11px;text-decoration:none;border:1px solid #333;border-radius:8px;padding:6px 14px;">
        全チャントをサイトで見る →
      </a>
    </div>`;
}

function setChantFilter(key) {
  chantFilter = key;
  render();
}

function renderStandings() {
  return `
    <div class="section-label">明治安田J1百年構想リーグ EAST 2026 第4節終了時</div>
    <div class="standings-table">
      <div class="standings-head">
        <span>#</span><span>チーム</span><span style="text-align:center">試</span>
        <span style="text-align:center">勝</span><span style="text-align:center">分</span>
        <span style="text-align:center">負</span><span style="text-align:center">得失</span>
        <span style="text-align:center">勝点</span>
      </div>
      ${standings.map(r => {
        const isR = r.team === '柏レイソル';
        const gd = r.gf - r.ga;
        return `
        <div class="standings-row ${isR?'reysol':''}">
          <span class="sc pos ${r.pos===1?'top':''}">${r.pos}</span>
          <span class="sc team ${isR?'reysol':''}">${r.team}</span>
          <span class="sc">${r.played}</span>
          <span class="sc win">${r.won}</span>
          <span class="sc">${r.draw}</span>
          <span class="sc lose">${r.lost}</span>
          <span class="sc">${gd>0?'+':''}${gd}</span>
          <span class="sc pts ${isR?'reysol':''}">${r.pts}</span>
        </div>`}).join('')}
    </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const content = document.getElementById('content');
  renderBanner();
  renderNav();

  if (activeTab === 'board') {
    content.className = 'content webview-mode';
    content.innerHTML = renderBoard();
  } else if (activeTab === 'community') {
    content.className = 'content';
    content.innerHTML = '<div id="community-root"></div>';
    if (window.renderCommunity) {
      window.renderCommunity();
    } else {
      const t = setInterval(() => {
        if (window.renderCommunity) { clearInterval(t); window.renderCommunity(); }
      }, 200);
      setTimeout(() => clearInterval(t), 10000);
    }
  } else {
    content.className = 'content';
    if (activeTab === 'news') content.innerHTML = renderNews();
    else if (activeTab === 'matches') content.innerHTML = renderMatches();
    else if (activeTab === 'chant') content.innerHTML = renderChant();
    else if (activeTab === 'standings') content.innerHTML = renderStandings();
  }
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setTab(key) {
  activeTab = key;
  render();
  document.getElementById('content').scrollTop = 0;
}

function setNewsFilter(cat) {
  newsFilter = cat;
  render();
}

function toggleMatch(id) {
  expandedMatch = expandedMatch === id ? null : id;
  render();
}

function setBBSPage(p) {
  if (p < 1) return;
  bbsPage = p;
  render();
}

function reloadBBS() {
  const iframe = document.getElementById('bbs-iframe');
  const btn = document.getElementById('bbs-reload-btn');
  const hint = document.getElementById('bbs-hint');
  if (!iframe) return;
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  if (hint) { hint.className = 'webview-hint loading'; hint.textContent = '⏳ 読み込み中...'; }
  iframe.src = iframe.src;
}

function onBBSLoad(iframe) {
  const btn = document.getElementById('bbs-reload-btn');
  const hint = document.getElementById('bbs-hint');
  if (btn) { btn.disabled = false; btn.textContent = '🔄'; }
  if (hint) { hint.className = 'webview-hint'; hint.textContent = '↓ 下に引っ張って更新'; }
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    // Inject dark CSS
    const style = doc.createElement('style');
    style.textContent = 'html,body{background:#0f0f0f!important;color:#ddd!important;font-size:13px!important;margin:0!important;padding:6px!important}a{color:#FFD700!important}hr{border-color:#333!important}input,textarea,select{background:#1a1a1a!important;color:#ddd!important;border:1px solid #444!important;border-radius:6px!important;padding:5px!important;width:100%!important}';
    doc.head.appendChild(style);
    // Scale to fit
    const screenW = iframe.clientWidth;
    const contentW = doc.body.scrollWidth;
    if (contentW > screenW + 4) {
      const ratio = screenW / contentW;
      doc.body.style.transformOrigin = '0 0';
      doc.body.style.transform = `scale(${ratio})`;
      doc.body.style.width = contentW + 'px';
      doc.documentElement.style.height = Math.ceil(doc.body.scrollHeight * ratio) + 'px';
      doc.documentElement.style.overflowX = 'hidden';
    }
  } catch(e) {}
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
fetchRSS(); // 起動時に自動でRSS取得

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import { getDatabase, ref, push, onValue, serverTimestamp, query, orderByChild, limitToLast, update, increment } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyBjCmDVUnUX80d_7KudYAHX9FaJun3l7ko",
  authDomain: "reysol-app.firebaseapp.com",
  databaseURL: "https://reysol-app-default-rtdb.firebaseio.com",
  projectId: "reysol-app",
  storageBucket: "reysol-app.firebasestorage.app",
  messagingSenderId: "50578755693",
  appId: "1:50578755693:web:ffa56d09041d8e3733af64"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ── STATE ────────────────────────────────────────────────────────────────────
let currentUser  = null;
let nickname     = localStorage.getItem('reysol_nickname') || '';
let communityPosts = [];
let unsubPosts   = null;
let replyingTo   = null;
let openReplies  = {};

signInAnonymously(auth);
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user && window.activeTab === 'community') renderCommunityDOM();
});

function subscribePosts() {
  if (unsubPosts) return;
  const q = query(ref(db, 'posts'), orderByChild('ts'), limitToLast(50));
  unsubPosts = onValue(q, snap => {
    communityPosts = [];
    snap.forEach(child => {
      communityPosts.unshift({ id: child.key, ...child.val() });
    });
    if (window.activeTab === 'community') renderCommunityDOM();
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  if (diff < 60000) return 'たった今';
  if (diff < 3600000) return `${Math.floor(diff/60000)}分前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}時間前`;
  return `${Math.floor(diff/86400000)}日前`;
}

window.renderCommunity = function() {
  subscribePosts();
  renderCommunityDOM();
};

function renderPostCard(p) {
  const liked = (p.likedBy||{})[currentUser?.uid];
  const replyCount = p.replies ? Object.keys(p.replies).length : 0;
  const repliesOpen = openReplies[p.id];
  const repliesHtml = repliesOpen && p.replies
    ? Object.entries(p.replies).sort((a,b) => (a[1].ts||0)-(b[1].ts||0)).map(([rid, r]) => `
        <div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #222">
          <div style="width:24px;height:24px;background:#333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--y);font-size:11px;flex-shrink:0">${escapeHtml(r.nick||'?')[0]}</div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
              <span style="color:var(--y);font-weight:700;font-size:12px">${escapeHtml(r.nick||'匿名')}</span>
              <span style="color:#444;font-size:10px">${timeAgo(r.ts)}</span>
            </div>
            <div style="color:#ccc;font-size:13px;line-height:1.5;word-break:break-word">${escapeHtml(r.text||'')}</div>
          </div>
        </div>`).join('')
    : '';

  return `
    <div style="background:var(--card);border-radius:14px;padding:13px 14px;margin-bottom:10px;border:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:30px;height:30px;background:var(--y);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#1a1a1a;font-size:13px;flex-shrink:0">${escapeHtml(p.nick||'?')[0]}</div>
          <span style="color:var(--y);font-weight:700;font-size:13px">${escapeHtml(p.nick||'匿名')}</span>
        </div>
        <span style="color:#444;font-size:11px">${timeAgo(p.ts)}</span>
      </div>
      <div style="color:#ddd;font-size:14px;line-height:1.6;word-break:break-word;margin-bottom:10px">${escapeHtml(p.text||'')}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="window.likePost('${p.id}')" style="background:none;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;color:${liked?'#ff6b6b':'#555'};font-size:12px;cursor:pointer;">
          ❤️ ${p.likes||0}
        </button>
        <button onclick="window.toggleReplies('${p.id}')" style="background:none;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;color:#555;font-size:12px;cursor:pointer;">
          💬 ${replyCount}件の返信${replyCount>0?(repliesOpen?' ▲':' ▼'):''}
        </button>
        <button onclick="window.startReply('${p.id}','${escapeHtml(p.nick||'匿名')}')" style="background:none;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;color:#888;font-size:12px;cursor:pointer;">
          ↩ 返信
        </button>
      </div>
      ${repliesHtml}
    </div>`;
}

function renderCommunityDOM() {
  window.renderCommunityDOM = renderCommunityDOM;
  const root = document.getElementById('community-root');
  if (!root) return;

  // ── ニックネーム未設定 ────────────────────────────────────────
  if (!nickname) {
    root.innerHTML = `
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:16px">💬</div>
        <div style="color:var(--y);font-weight:900;font-size:20px;margin-bottom:8px">トーク</div>
        <div style="color:#666;font-size:13px;margin-bottom:28px">このアプリのファン同士で交流できる掲示板です。<br>まずニックネームを設定してください。</div>
        <input id="nick-input" type="text" maxlength="12" placeholder="ニックネーム（12文字以内）"
          style="width:100%;background:#1e1e1e;border:1px solid #444;border-radius:10px;padding:12px 14px;color:#fff;font-size:15px;font-family:inherit;margin-bottom:12px;outline:none;">
        <button onclick="window.saveNickname()" style="width:100%;background:var(--y);color:#1a1a1a;font-weight:900;font-size:15px;padding:13px;border-radius:12px;border:none;cursor:pointer;font-family:inherit">
          トークに参加する ⚽
        </button>
      </div>`;
    return;
  }

  const replyBanner = replyingTo ? `
    <div style="display:flex;align-items:center;justify-content:space-between;background:#1e1e1e;border:1px solid color-mix(in srgb,var(--y) 30%,transparent);border-radius:10px;padding:8px 12px;margin-bottom:8px">
      <span style="color:var(--y);font-size:12px">↩ <b>${escapeHtml(replyingTo.nick)}</b> さんへ返信中</span>
      <button onclick="window.cancelReply()" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1;">×</button>
    </div>` : '';

  root.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <span style="color:var(--y);font-weight:900;font-size:15px">💬 トーク</span>
        <span style="color:#555;font-size:11px;margin-left:8px">${communityPosts.length}件の投稿</span>
      </div>
      <button onclick="window.changeNickname()" style="background:none;border:1px solid #333;border-radius:8px;padding:4px 10px;color:#888;font-size:11px;cursor:pointer;font-family:inherit">👤 ${escapeHtml(nickname)}</button>
    </div>

    <div style="background:var(--card);border-radius:14px;padding:13px;margin-bottom:14px;border:1px solid color-mix(in srgb,var(--y) 25%,transparent)">
      ${replyBanner}
      <textarea id="post-input" placeholder="${replyingTo ? '返信を入力...' : 'レイソルについて語ろう！'}" maxlength="200"
        style="width:100%;background:#111;border:1px solid #333;border-radius:10px;padding:10px 12px;color:#fff;font-size:14px;font-family:inherit;resize:none;height:70px;outline:none;margin-bottom:10px;"></textarea>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span id="char-count" style="color:#555;font-size:11px">0 / 200</span>
        <button onclick="window.submitPost()" style="background:var(--y);color:#1a1a1a;font-weight:900;font-size:13px;padding:8px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit">
          ${replyingTo ? '返信する' : '投稿する'}
        </button>
      </div>
    </div>

    ${communityPosts.length === 0
      ? `<div style="text-align:center;padding:32px;color:#444;font-size:13px">まだ投稿がありません。<br>最初の投稿をしてみよう！</div>`
      : communityPosts.map(p => renderPostCard(p)).join('')}`;

  const ta = document.getElementById('post-input');
  const cc = document.getElementById('char-count');
  if (ta && cc) ta.oninput = () => { cc.textContent = `${ta.value.length} / 200`; };
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.saveNickname = function() {
  const val = document.getElementById('nick-input')?.value?.trim();
  if (!val) return;
  nickname = val;
  localStorage.setItem('reysol_nickname', nickname);
  renderCommunityDOM();
};

window.changeNickname = function() {
  if (confirm(`ニックネームを変更しますか？\
現在: ${nickname}`)) {
    nickname = '';
    localStorage.removeItem('reysol_nickname');
    renderCommunityDOM();
  }
};

window.startReply = function(postId, nick) {
  replyingTo = { id: postId, nick };
  openReplies[postId] = true;
  renderCommunityDOM();
  setTimeout(() => document.getElementById('post-input')?.focus(), 80);
};

window.cancelReply = function() {
  replyingTo = null;
  renderCommunityDOM();
};

window.toggleReplies = function(postId) {
  openReplies[postId] = !openReplies[postId];
  renderCommunityDOM();
};

window.submitPost = async function() {
  if (!currentUser) return alert('認証中です。しばらくお待ちください。');
  const ta = document.getElementById('post-input');
  const text = ta?.value?.trim();
  if (!text) return;
  if (text.length > 200) return;
  try {
    if (replyingTo) {
      // 返信
      await push(ref(db, `posts/${replyingTo.id}/replies`), {
        text, nick: nickname,
        uid: currentUser.uid,
        ts: serverTimestamp(),
      });
      openReplies[replyingTo.id] = true;
      replyingTo = null;
    } else {
      // 新規投稿
      await push(ref(db, 'posts'), {
        text, nick: nickname,
        uid: currentUser.uid,
        ts: serverTimestamp(),
        likes: 0, likedBy: {}
      });
    }
    if (ta) ta.value = '';
    const cc = document.getElementById('char-count');
    if (cc) cc.textContent = '0 / 200';
  } catch(e) { alert('投稿に失敗しました。'); }
};

window.likePost = async function(postId) {
  if (!currentUser) return;
  const post = communityPosts.find(p => p.id === postId);
  if (!post) return;
  const alreadyLiked = (post.likedBy||{})[currentUser.uid];
  await update(ref(db, `posts/${postId}`), {
    likes: increment(alreadyLiked ? -1 : 1),
    [`likedBy/${currentUser.uid}`]: alreadyLiked ? null : true
  });
};
</script>
</body>
</html>
