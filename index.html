<style>
  :root { --y: #FFD700; --bg: #0f0f0f; --card: #1a1a1a; --card2: #111; --border: #252525; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: #ddd; font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }

  /* LAYOUT */
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; position: relative; }

  /* HEADER */
  .header { background: var(--card); border-bottom: 3px solid var(--y); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 42px; height: 42px; background: var(--y); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 24px; color: #1a1a1a; font-weight: 900; }
  .header-title { font-family: 'Bebas Neue'; font-size: 20px; color: var(--y); letter-spacing: 2px; }
  .header-sub { font-size: 10px; color: #888; letter-spacing: 1px; }
  .live-badge { background: #ff4444; border-radius: 4px; padding: 2px 7px; font-size: 10px; font-weight: 700; color: #fff; }

  /* BANNER */
  .banner { margin: 10px 12px; background: var(--card); border-radius: 14px; padding: 12px 14px; border: 1px solid color-mix(in srgb, var(--y) 30%, transparent); flex-shrink: 0; }
  .banner-label { color: var(--y); font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
  .banner-row { display: flex; align-items: center; justify-content: space-between; }
  .banner-team { font-size: 13px; font-weight: 700; }
  .banner-team-sub { font-size: 11px; color: #aaa; margin-bottom: 3px; }
  .banner-vs { font-family: 'Bebas Neue'; font-size: 28px; color: #fff; letter-spacing: 2px; text-align: center; }
  .banner-date { font-size: 10px; color: #888; text-align: center; }
  .banner-btns { display: flex; gap: 6px; margin-top: 10px; }
  .banner-btn { flex: 1; border-radius: 8px; padding: 7px; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; }
  .banner-btn-y { background: var(--y); color: #1a1a1a; }
  .banner-btn-ghost { border: 1px solid #ffffff22; color: #fff; }

  /* TAB BAR */
  .tabbar { display: flex; gap: 6px; padding: 6px 16px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
  .tabbar::-webkit-scrollbar { display: none; }
  .tab-btn { background: #1e1e1e; border: none; border-radius: 20px; padding: 7px 14px; font-size: 12px; font-weight: 700; color: #aaa; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans JP'; }
  .tab-btn.active { background: var(--y); color: #1a1a1a; }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 14px 14px 80px; overscroll-behavior: contain; }
  .content.webview-mode { padding: 0; overflow: hidden; }

  /* BOTTOM NAV */
  .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; background: #111; border-top: 2px solid color-mix(in srgb, var(--y) 20%, transparent); display: flex; padding: 8px 0 env(safe-area-inset-bottom, 10px); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; background: none; border: none; font-family: 'Noto Sans JP'; }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; color: #555; }
  .nav-item.active .nav-label { color: var(--y); font-weight: 700; }

  /* CARDS */
  .card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .card.hot { border-color: color-mix(in srgb, var(--y) 27%, transparent); }

  /* NEWS */
  .cat-chips { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .cat-chips::-webkit-scrollbar { display: none; }
  .chip { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 20px; padding: 6px 12px; font-size: 11px; color: #777; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans JP'; }
  .chip.active { background: var(--y); border-color: var(--y); color: #1a1a1a; font-weight: 700; }
  .news-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .cat-tag { border-radius: 20px; padding: 2px 8px; font-size: 10px; font-weight: 700; border: 1px solid; }
  .news-source { font-size: 10px; color: #555; }
  .news-date { font-size: 10px; color: #555; margin-left: auto; }
  .hot-badge { background: #ff4444; color: #fff; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
  .news-title { color: #fff; font-weight: 700; font-size: 14px; line-height: 1.5; margin-bottom: 6px; }
  .news-summary { color: #888; font-size: 12px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .news-read { color: var(--y); font-weight: 700; font-size: 11px; margin-top: 8px; }
  .card a { text-decoration: none; display: block; }

  /* MATCHES */
  .section-label { color: #666; font-size: 12px; font-weight: 500; margin-bottom: 10px; }
  .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .comp-text { color: #666; font-size: 10px; }
  .status-badge { background: #2a2a2a; border-radius: 10px; padding: 2px 8px; font-size: 10px; font-weight: 700; color: #666; }
  .status-badge.upcoming { background: color-mix(in srgb, var(--y) 13%, transparent); color: var(--y); }
  .match-row { display: flex; align-items: center; justify-content: space-between; }
  .team-name { font-size: 13px; font-weight: 700; }
  .team-name.reysol { color: var(--y); }
  .score-box { text-align: center; padding: 0 16px; }
  .score-text { font-family: 'Bebas Neue'; font-size: 28px; letter-spacing: 4px; }
  .vs-text { font-family: 'Bebas Neue'; font-size: 22px; color: #555; letter-spacing: 2px; }
  .venue-text { color: #555; font-size: 10px; margin-top: 6px; text-align: center; }
  .scorers-box { margin-top: 10px; padding: 8px; background: var(--card2); border-radius: 8px; border-left: 3px solid var(--y); }
  .scorers-title { color: var(--y); font-weight: 700; font-size: 10px; margin-bottom: 4px; }
  .scorer-item { color: #ccc; font-size: 11px; }
  .match-card { cursor: pointer; }
  .match-card.win { border-color: color-mix(in srgb, var(--y) 27%, transparent); }

  /* BBS WEBVIEW */
  .webview-container { display: flex; flex-direction: column; height: 100%; }
  .webview-header { display: flex; align-items: center; padding: 10px 16px; background: var(--card); border-bottom: 1px solid color-mix(in srgb, var(--y) 20%, transparent); gap: 8px; flex-shrink: 0; }
  .webview-hint { background: var(--card2); padding: 5px; text-align: center; font-size: 10px; color: #444; border-bottom: 1px solid #222; flex-shrink: 0; }
  .webview-hint.loading { background: color-mix(in srgb, var(--y) 13%, transparent); color: var(--y); font-weight: 700; }
  .page-nav { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 8px; background: var(--card2); border-bottom: 1px solid #222; flex-shrink: 0; }
  .page-btn { border-radius: 16px; padding: 5px 16px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid; font-family: 'Noto Sans JP'; }
  .page-btn.active { background: color-mix(in srgb, var(--y) 13%, transparent); border-color: color-mix(in srgb, var(--y) 33%, transparent); color: var(--y); }
  .page-btn.disabled { background: var(--card); border-color: #2a2a2a; color: #444; cursor: default; }
  .page-num { color: #666; font-size: 12px; }
  .bbs-iframe { flex: 1; border: none; width: 100%; background: var(--bg); }
  .action-btn { border: 1px solid; border-radius: 8px; padding: 5px 10px; font-size: 10px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP'; background: none; }
  .reload-btn { border-color: color-mix(in srgb, var(--y) 40%, transparent); color: var(--y); background: color-mix(in srgb, var(--y) 9%, transparent); }
  .reload-btn:disabled { border-color: #333; color: #444; background: var(--card2); cursor: default; }
  .post-btn { border-color: color-mix(in srgb, var(--y) 27%, transparent); color: var(--y); background: color-mix(in srgb, var(--y) 7%, transparent); }

  /* STANDINGS */
  .standings-table { background: var(--card); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .standings-head { display: grid; grid-template-columns: 24px 1fr 28px 28px 28px 28px 30px 36px; gap: 4px; padding: 10px 12px; background: var(--card2); font-size: 10px; color: #666; font-weight: 700; border-bottom: 1px solid #2a2a2a; }
  .standings-row { display: grid; grid-template-columns: 24px 1fr 28px 28px 28px 28px 30px 36px; gap: 4px; padding: 11px 12px; align-items: center; border-bottom: 1px solid #222; }
  .standings-row:last-child { border-bottom: none; }
  .standings-row.reysol { background: color-mix(in srgb, var(--y) 8%, transparent); }
  .sc { font-size: 12px; text-align: center; color: #888; }
  .sc.pos { color: #666; font-weight: 700; }
  .sc.pos.top { color: var(--y); }
  .sc.team { text-align: left; color: #ddd; font-size: 12px; }
  .sc.team.reysol { color: var(--y); font-weight: 700; }
  .sc.win { color: #4caf50; }
  .sc.lose { color: #f44336; }
  .sc.pts { font-weight: 700; color: #fff; }
  .sc.pts.reysol { color: var(--y); }

  /* ANIMATION */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fadeIn 0.2s ease both; }
</style>
</head>

<script>
const Y = '#FFD700';

let matches = [];

// TheSportsDB (無料・APIキー不要・2026対応)
const TSDB = 'https://www.thesportsdb.com/api/v1/json/123';

const TEAM_JP = {

  'Shimizu S-Pulse': '清水エスパルス',
  'V-Varen Nagasaki': 'V・ファーレン長崎',
};
function toJP(name) { return TEAM_JP[name] || name; }

// UTC日時文字列 → JST（UTC+9）に変換してDate取得
function toJST(dateStr, timeStr) {
  // dateStr: "2026-03-07", timeStr: "04:00:00" (UTC)
  if (!timeStr || timeStr === '00:00:00') {
    // 時刻不明の場合はdateEventをそのまま使う（日付はJSTとして扱う）
    const d = new Date(dateStr + 'T00:00:00+09:00');
    return d;
  }
  const d = new Date(dateStr + 'T' + timeStr + 'Z'); // UTC
  return new Date(d.getTime() + 9 * 60 * 60 * 1000); // → JST
}

function fmtDate(dateStr, timeStr) {
  const d = toJST(dateStr, timeStr);
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getUTCFullYear()}年${d.getUTCMonth()+1}月${d.getUTCDate()}日(${days[d.getUTCDay()]})`;
}

function fmtTime(dateStr, timeStr) {
  if (!timeStr || timeStr === '00:00:00') return 'TBD';
  const d = toJST(dateStr, timeStr);
  const h = d.getUTCHours(), m = d.getUTCMinutes();
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function tsdbEventToMatch(e) {
  const finished = e.strStatus === 'Match Finished' ||
    (e.intHomeScore !== null && e.intHomeScore !== '' &&
     e.intAwayScore !== null && e.intAwayScore !== '' &&
     e.strStatus !== 'Not Started');
  return {
    rawDate: e.dateEvent || '',
    id: e.idEvent,
    date: fmtDate(e.dateEvent, e.strTime),
    time: fmtTime(e.dateEvent, e.strTime),
    home: toJP(e.strHomeTeam),
    away: toJP(e.strAwayTeam),
    homeScore: finished ? parseInt(e.intHomeScore) : null,
    awayScore: finished ? parseInt(e.intAwayScore) : null,
    venue: e.strVenue || '',
    status: finished ? 'finished' : 'upcoming',
    competition: e.strLeague || 'J1リーグ',
    scorers: [],
  };
}

// 柏レイソル 2026年 全試合日程（静的・ゲキサカより）
// status: 'finished'=終了, 'upcoming'=予定
const KASHIWA_SCHEDULE = [
  { round:'第1節',  rawDate:'2026-02-08', time:'14:00', home:'川崎フロンターレ', away:'柏レイソル',   venue:'Uvanceとどろきスタジアム by Fujitsu', homeScore:5, awayScore:3 },
  { round:'第2節',  rawDate:'2026-02-15', time:'13:00', home:'柏レイソル',       away:'東京ヴェルディ', venue:'三協フロンテア柏スタジアム', homeScore:1, awayScore:2 },
  { round:'第3節',  rawDate:'2026-02-21', time:'14:00', home:'鹿島アントラーズ', away:'柏レイソル',   venue:'カシマスタジアム', homeScore:2, awayScore:0 },

  { round:'第6節',  rawDate:'2026-03-14', time:'14:00', home:'柏レイソル',       away:'FC町田ゼルビア', venue:'三協フロンテア柏スタジアム' },
  { round:'第7節',  rawDate:'2026-03-18', time:'19:30', home:'浦和レッズ',       away:'柏レイソル',   venue:'埼玉スタジアム2002' },
  { round:'第8節',  rawDate:'2026-03-22', time:'16:00', home:'柏レイソル',       away:'水戸ホーリーホック', venue:'三協フロンテア柏スタジアム' },
  { round:'第9節',  rawDate:'2026-04-04', time:'13:00', home:'柏レイソル',       away:'横浜F・マリノス', venue:'三協フロンテア柏スタジアム' },
  { round:'第10節', rawDate:'2026-04-11', time:'14:00', home:'東京ヴェルディ',   away:'柏レイソル',   venue:'味の素スタジアム' },
  { round:'第11節', rawDate:'2026-04-18', time:'14:00', home:'柏レイソル',       away:'鹿島アントラーズ', venue:'三協フロンテア柏スタジアム' },
  { round:'第12節', rawDate:'2026-04-25', time:'14:00', home:'柏レイソル',       away:'浦和レッズ',   venue:'三協フロンテア柏スタジアム' },
  { round:'第13節', rawDate:'2026-05-02', time:'14:00', home:'FC町田ゼルビア',   away:'柏レイソル',   venue:'町田GIONスタジアム' },
  { round:'第14節', rawDate:'2026-05-06', time:'19:00', home:'柏レイソル',       away:'川崎フロンターレ', venue:'三協フロンテア柏スタジアム' },
  { round:'第15節', rawDate:'2026-05-10', time:'14:00', home:'水戸ホーリーホック',away:'柏レイソル',  venue:'Ksスタジアム' },
  { round:'第16節', rawDate:'2026-05-17', time:'14:00', home:'柏レイソル',       away:'FC東京',       venue:'三協フロンテア柏スタジアム' },
  { round:'第17節', rawDate:'2026-05-23', time:'14:00', home:'横浜F・マリノス',  away:'柏レイソル',   venue:'日産スタジアム' },
  { round:'第18節', rawDate:'2026-05-24', time:'14:00', home:'柏レイソル',       away:'ジェフ千葉',   venue:'三協フロンテア柏スタジアム' },
];

async function fetchMatches() {
  matchesLoading = true;
  matchesError = false;
  if (activeTab === 'matches') render();
  try {
    // 静的日程をベースに作成
    const today = new Date();
    const base = KASHIWA_SCHEDULE.map((s, i) => {
      const dt = new Date(s.rawDate + 'T' + s.time + ':00+09:00');
      const hasStaticScore = s.homeScore !== undefined;
      const finished = hasStaticScore || dt < today;
      return {
        id: 'k' + i,
        rawDate: s.rawDate,
        date: (() => {
          const d = new Date(s.rawDate + 'T00:00:00+09:00');
          const days = ['日','月','火','水','木','金','土'];
          return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${days[d.getDay()]})`;
        })(),
        time: s.time,
        home: s.home,
        away: s.away,
        homeScore: hasStaticScore ? s.homeScore : null,
        awayScore: hasStaticScore ? s.awayScore : null,
        venue: s.venue,
        status: finished ? 'finished' : 'upcoming',
        competition: s.round + ' J1百年構想リーグ',
      };
    });

    // TheSportsDBでスコア補完を試みる
    try {
      const [nextRes, lastRes] = await Promise.all([
        fetch(`${TSDB}/eventsnext.php?id=${KASHIWA_TSDB}`),
        fetch(`${TSDB}/eventslast.php?id=${KASHIWA_TSDB}`),
      ]);
      const [nextData, lastData] = await Promise.all([nextRes.json(), lastRes.json()]);
      const apiEvents = [...(nextData.events||[]), ...(lastData.results||[])];

      // 日付でマッチングしてスコアを上書き（静的スコアがない場合のみ）
      for (const e of apiEvents) {
        const match = base.find(m => m.rawDate === e.dateEvent && m.homeScore === null);
        if (match && e.intHomeScore != null && e.intHomeScore !== '') {
          match.homeScore = parseInt(e.intHomeScore);
          match.awayScore = parseInt(e.intAwayScore);
          match.status = 'finished';
        }
      }
    } catch(err) {
      console.warn('[Reysol] score overlay failed:', err.message);
    }

    matches = base.sort((a, b) => {
      const aDate = new Date(a.rawDate);
      const bDate = new Date(b.rawDate);
      if (a.status === 'finished' && b.status === 'finished') return bDate - aDate;
      if (a.status !== 'finished' && b.status !== 'finished') return aDate - bDate;
      if (a.status === 'finished') return -1;
      return 1;
    });
  } catch(e) {
    console.error('[Reysol] fetchMatches error:', e);
    matchesError = true;
  }
  matchesLoading = false;
  if (activeTab === 'matches') render();
}

async function fetchStandings() {
  standingsLoading = true;
  standingsError = false;
  if (activeTab === 'standings') render();
  try {
    // allorigins.win プロキシ経由でmobaj.netをスクレイピング
    const url = 'https://mobaj.net/2026/standings/j1';
    const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
    const json = await res.json();
    const html = json.contents || '';

    // EASTテーブルのtbodyを抽出
    const tbodyMatch = html.match(/EAST[\s\S]{0,500}?<tbody>([\s\S]*?)<\/tbody>/i);
    if (!tbodyMatch) throw new Error('EAST table not found');
    const rows = tbodyMatch[1].match(/<tr[\s\S]*?<\/tr>/gi) || [];

    const parsed = rows.map(row => {
      const cells = (row.match(/<td[^>]*>([\s\S]*?)<\/td>/gi) || [])
        .map(c => c.replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&#\d+;/g,'').trim());
      if (cells.length < 9) return null;
      // cells: [順位, クラブ, 勝点, 試合, 勝, PK勝, 負, PK負, 得点, 失点, 得失差]
      return {
        pos:    parseInt(cells[0]) || 0,
        team:   cells[1],
        pts:    parseInt(cells[2]) || 0,
        played: parseInt(cells[3]) || 0,
        won:    parseInt(cells[4]) || 0,
        draw:   parseInt(cells[6]) || 0,
        lost:   (parseInt(cells[5])||0) + (parseInt(cells[6])||0),
        gf:     parseInt(cells[7] !== undefined ? cells[8] : cells[7]) || 0,
        ga:     parseInt(cells[7] !== undefined ? cells[9] : cells[8]) || 0,
      };
    }).filter(r => r && r.pos > 0 && r.team.length > 1);

    console.log('[Reysol] scraped standings:', parsed);
    if (parsed.length >= 5) {
      standings = parsed;
    } else {
      throw new Error('too few rows: ' + parsed.length);
    }
  } catch(e) {
    console.warn('[Reysol] standings scrape failed, using static:', e.message);
    standings = STANDINGS_STATIC.map(t => ({...t}));
  }
  standingsLoading = false;
  if (activeTab === 'standings') render();
}

];

// RSSをプロキシ経由で取得（複数プロキシを順番に試す）
async function fetchRSSUrl(url) {
  const proxies = [
    u => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}&count=30`,
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  ];
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy(url), { signal: AbortSignal.timeout(6000) });
      const data = await res.json();
      // rss2json形式
      if (data.status === 'ok' && data.items) return { items: data.items, format: 'rss2json' };
      // allorigins形式 → XMLをパース
      if (data.contents) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(data.contents, 'text/xml');
        const items = [...xml.querySelectorAll('item')].map(el => ({
          title:       el.querySelector('title')?.textContent || '',
          link:        el.querySelector('link')?.textContent || '',
          pubDate:     el.querySelector('pubDate')?.textContent || '',
          description: el.querySelector('description')?.textContent || '',
        }));
        if (items.length > 0) return { items, format: 'xml' };
      }
    } catch(e) { /* 次のプロキシへ */ }
  }
  return null;
}

async function fetchRSS() {
  rssLoading = true;
  rssError = false;
  if (activeTab === 'news') render();

  const allItems = [];

  await Promise.all(RSS_SOURCES.map(async (src) => {
    try {
      const result = await fetchRSSUrl(src.url);
      if (!result) return;
      result.items.forEach(item => {
        const title = item.title || '';
        const desc  = item.description || item.content || '';
        const text  = (title + ' ' + desc).toLowerCase();
        const isReysol = src.kashiwaOnly
          || text.includes('柏') || text.includes('reysol') || text.includes('レイソル')
          || text.includes('kashiwa');
        if (!isReysol) return;
        const pubDate = new Date(item.pubDate);
        if (isNaN(pubDate)) return;
        const dateStr = `${pubDate.getFullYear()}/${String(pubDate.getMonth()+1).padStart(2,'0')}/${String(pubDate.getDate()).padStart(2,'0')}`;
        const summary = desc.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim().slice(0, 120);
        allItems.push({
          id: item.link || title,
          category: src.category,
          color: src.color,
          source: src.source,
          date: dateStr,
          pubDate,
          title,
          summary,
          url: item.link || '#',
          hot: false,
        });
      });
    } catch(e) { console.warn('[Reysol] RSS failed:', src.source, e.message); }
  }));

  if (allItems.length > 0) {
    // 重複タイトル除去 & 日付降順
    const seen = new Set();
    allItems.sort((a, b) => b.pubDate - a.pubDate);
    rssNews = allItems.filter(item => {
      const key = item.title.slice(0, 30);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    }).slice(0, 50);
    rssError = false;
  } else {
    rssNews = news;
    rssError = true;
  }

  rssLoading = false;
  if (activeTab === 'news') render();
}

    <div style="text-align:center;padding:48px 16px;color:#555">
      <div style="font-size:32px;margin-bottom:12px">⏳</div>
      <div style="font-size:13px">順位表を取得中...</div>
    </div>`;
  if (standingsError || standings.length === 0) return `
    <div style="text-align:center;padding:48px 16px">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <div style="color:#888;font-size:13px;margin-bottom:16px">データの取得に失敗しました</div>
      <button onclick="fetchStandings()" style="background:var(--y);color:#1a1a1a;font-weight:900;font-size:13px;padding:10px 24px;border-radius:10px;border:none;cursor:pointer;font-family:inherit">🔄 再取得</button>
    </div>`;
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:11px;color:#888;margin-bottom:4px">🗾 EASTグループ（柏レイソル所属）</div>
      <button onclick="fetchStandings()" style="background:none;border:1px solid #333;border-radius:8px;padding:4px 10px;color:#888;font-size:11px;cursor:pointer;font-family:inherit">🔄 更新</button>
    </div>
    <div class="standings-table">
      <div class="standings-head">
        <span>#</span><span>チーム</span><span style="text-align:center">試</span>
        <span style="text-align:center">勝</span><span style="text-align:center">分</span>
        <span style="text-align:center">負</span><span style="text-align:center">得失</span>
        <span style="text-align:center">勝点</span>
      </div>
      ${standings.map(r => {
        const isR = r.team === '柏レイソル';
        const gd = r.gf - r.ga;
        return `
        <div class="standings-row ${isR?'reysol':''}">
          <span class="sc pos ${r.pos===1?'top':''}">${r.pos}</span>
          <span class="sc team ${isR?'reysol':''}">${r.team}</span>
          <span class="sc">${r.played}</span>
          <span class="sc win">${r.won}</span>
          <span class="sc">${r.draw}</span>
          <span class="sc lose">${r.lost}</span>
          <span class="sc">${gd>0?'+':''}${gd}</span>
          <span class="sc pts ${isR?'reysol':''}">${r.pts}</span>
        </div>`}).join('')}
    </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const content = document.getElementById('content');
  renderBanner();
  renderNav();

  if (activeTab === 'board') {
    content.className = 'content webview-mode';
    content.innerHTML = renderBoard();
  } else if (activeTab === 'community') {
    content.className = 'content';
    content.innerHTML = window.renderCommunity ? window.renderCommunity() : '<div id="community-root"></div>';
  } else {
    content.className = 'content';
    if (activeTab === 'news') content.innerHTML = renderNews();
    else if (activeTab === 'matches') content.innerHTML = renderMatches();
    else if (activeTab === 'chant') content.innerHTML = renderChant();
    else if (activeTab === 'standings') content.innerHTML = renderStandings();
  }
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setTab(key) {
  activeTab = key;
  window.activeTab = key;
  if (key === 'community') {
    lastReadTs = Date.now();
    window.lastReadTs = lastReadTs;
    localStorage.setItem('reysol_last_read_ts', lastReadTs);
    unreadCount = 0;
    window.unreadCount = 0;
    window.unreadReplyCount = 0;
    // 返信既読は各返信を開いた時点で記録（ここでは投稿未読のみリセット）
  }
  render();
  document.getElementById('content').scrollTop = 0;
  if (key === 'community') setTimeout(() => { if (window.renderCommunityDOM) window.renderCommunityDOM(); }, 50);
}

function setNewsFilter(cat) {
  newsFilter = cat;
  render();
}

function setChantFilter(f) {
  chantFilter = f;
  render();
}

function toggleMatch(id) {
  expandedMatch = expandedMatch === id ? null : id;
  render();
}

function setBBSPage(p) {
  if (p < 1) return;
  bbsPage = p;
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
fetchRSS();
fetchMatches();
fetchStandings();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import { getDatabase, ref, push, onValue, serverTimestamp, query, orderByChild, limitToLast, update, increment, remove } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyBjCmDVUnUX80d_7KudYAHX9FaJun3l7ko",
  authDomain: "reysol-app.firebaseapp.com",
  databaseURL: "https://reysol-app-default-rtdb.firebaseio.com",
  projectId: "reysol-app",
  storageBucket: "reysol-app.firebasestorage.app",
  messagingSenderId: "50578755693",
  appId: "1:50578755693:web:ffa56d09041d8e3733af64"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentUser = null;
let nickname = localStorage.getItem('reysol_nickname') || '';
let communityPosts = [];
let unsubPosts = null;

// ── AUTH ──────────────────────────────────────────────────────────────────────
signInAnonymously(auth);
onAuthStateChanged(auth, user => {
  currentUser = user;
  window.currentUserUid = user?.uid || null;
  if (user && window.activeTab === 'community') renderCommunityDOM();
});

// ── POSTS LISTENER ────────────────────────────────────────────────────────────
function subscribePosts() {
  if (unsubPosts) return;
  const q = query(ref(db, 'posts'), orderByChild('ts'), limitToLast(50));
  unsubPosts = onValue(q, snap => {
    communityPosts = [];
    snap.forEach(child => {
      communityPosts.unshift({ id: child.key, ...child.val() });
    });
    // トークタブ非表示中のみ未読カウント更新
    if (window.activeTab !== 'community') {
      // 新着投稿カウント
      window.unreadCount = communityPosts.filter(p => (p.ts || 0) > (window.lastReadTs || 0)).length;
      // 自分の投稿への未読返信カウント（自分以外からの返信）
      let replyUnread = 0;
      const uid = window.currentUserUid;
      if (uid) {
        for (const p of communityPosts) {
          if (p.uid !== uid) continue;
          if (!p.replies) continue;
          replyUnread += Object.values(p.replies).filter(
            r => (r.ts||0) > (window.lastReadReplyTs||0) && r.uid !== uid
          ).length;
        }
      }
      window.unreadReplyCount = replyUnread;
      if (window.renderNav) window.renderNav();
    }
    if (window.activeTab === 'community') renderCommunityDOM();
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  if (diff < 60000) return 'たった今';
  if (diff < 3600000) return `${Math.floor(diff/60000)}分前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}時間前`;
  return `${Math.floor(diff/86400000)}日前`;
}

function nickColor(nick) {
  let h = 0;
  for (const c of (nick || '?')) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  const hue = h % 360;
  const adj = (hue >= 45 && hue <= 75) ? (hue + 90) % 360 : hue;
  return { bg: `hsl(${adj},65%,42%)`, text: `hsl(${adj},80%,80%)` };
}

let replyingTo = null;
let openReplies = {};
let lastReadReplyTs = parseInt(localStorage.getItem('reysol_last_read_reply_ts') || '0');
let unreadReplyCount = 0;

// ── RENDER ────────────────────────────────────────────────────────────────────
window.renderCommunity = function() {
  subscribePosts();
  return `<div id="community-root"></div>`;
};

function renderPostCard(p) {
  const liked = (p.likedBy||{})[currentUser?.uid];
  const isOwn = p.uid === currentUser?.uid;
  const replyCount = p.replies ? Object.keys(p.replies).length : 0;
  const repliesOpen = openReplies[p.id];

  // 自分の投稿への未読返信数
  const unreadReplies = isOwn && p.replies
    ? Object.values(p.replies).filter(r => (r.ts||0) > lastReadReplyTs && r.uid !== currentUser?.uid).length
    : 0;

  const repliesHtml = repliesOpen && p.replies
    ? Object.entries(p.replies).sort((a,b) => (a[1].ts||0)-(b[1].ts||0)).map(([rid, r]) => {
        const isOwnReply = r.uid === currentUser?.uid;
        const isNew = isOwn && (r.ts||0) > lastReadReplyTs && r.uid !== currentUser?.uid;
        // 誰への返信かを表示
        const replyToLabel = r.replyToNick
          ? `<span style="color:#666;font-size:11px;margin-bottom:4px;display:block">↩ ${escapeHtml(r.replyToNick)} さんへ</span>`
          : '';
        return `
        <div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #222;${isNew?'background:color-mix(in srgb,var(--y) 6%,transparent);margin-left:-4px;padding-left:4px;border-radius:8px':''}">
          <div style="width:24px;height:24px;background:${nickColor(r.nick).bg};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:11px;flex-shrink:0">${escapeHtml(r.nick||'?')[0]}</div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="color:${nickColor(r.nick).text};font-weight:700;font-size:12px">${escapeHtml(r.nick||'匿名')}</span>
                ${isNew ? `<span style="background:#ff4444;color:#fff;font-size:9px;font-weight:900;padding:1px 5px;border-radius:6px">NEW</span>` : ''}
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="color:#444;font-size:10px">${timeAgo(r.ts)}</span>
                ${isOwnReply ? `<button onclick="window.deleteReply('${p.id}','${rid}')" style="background:none;border:none;color:#555;font-size:13px;cursor:pointer;padding:0;line-height:1;">🗑️</button>` : ''}
              </div>
            </div>
            ${replyToLabel}
            <div style="color:#ccc;font-size:13px;line-height:1.5;word-break:break-word">${escapeHtml(r.text||'')}</div>
            <button onclick="window.startReply('${p.id}','${escapeHtml(r.nick||'匿名')}','${rid}')" style="background:none;border:none;color:#555;font-size:11px;cursor:pointer;padding:4px 0 0;font-family:inherit">↩ 返信</button>
          </div>
        </div>`}).join('')
    : '';

  const replyBadge = unreadReplies > 0
    ? `<span style="background:#ff4444;color:#fff;font-size:9px;font-weight:900;padding:1px 5px;border-radius:6px;margin-left:4px">${unreadReplies}</span>`
    : '';

  return `
    <div style="background:var(--card);border-radius:14px;padding:13px 14px;margin-bottom:10px;border:1px solid ${unreadReplies>0?'#ff444466':' var(--border)'}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:30px;height:30px;background:${nickColor(p.nick).bg};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:13px;flex-shrink:0">${escapeHtml(p.nick||'?')[0]}</div>
          <span style="color:${nickColor(p.nick).text};font-weight:700;font-size:13px">${escapeHtml(p.nick||'匿名')}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:#444;font-size:11px">${timeAgo(p.ts)}</span>
          ${isOwn ? `<button onclick="window.deletePost('${p.id}')" style="background:none;border:none;color:#555;font-size:15px;cursor:pointer;padding:0;line-height:1;">🗑️</button>` : ''}
        </div>
      </div>
      <div style="color:#ddd;font-size:14px;line-height:1.6;word-break:break-word;margin-bottom:10px">${escapeHtml(p.text||'')}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="window.likePost('${p.id}')" style="background:none;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;color:${liked?'#ff6b6b':'#555'};font-size:12px;cursor:pointer;">
          ❤️ ${p.likes||0}
        </button>
        <button onclick="window.toggleReplies('${p.id}')" style="background:none;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;color:#555;font-size:12px;cursor:pointer;display:flex;align-items:center">
          💬 ${replyCount}件${replyCount>0?(repliesOpen?' ▲':' ▼'):''}${replyBadge}
        </button>
        <button onclick="window.startReply('${p.id}','${escapeHtml(p.nick||'匿名')}')" style="background:none;border:1px solid #2a2a2a;border-radius:20px;padding:4px 12px;color:#888;font-size:12px;cursor:pointer;">
          ↩ 返信
        </button>
      </div>
      ${repliesHtml}
    </div>`;
}

function renderCommunityDOM() {
  window.renderCommunityDOM = renderCommunityDOM;
  const root = document.getElementById('community-root');
  if (!root) return;

  if (!nickname) {
    root.innerHTML = `
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:48px;margin-bottom:16px">💬</div>
        <div style="color:var(--y);font-weight:900;font-size:20px;margin-bottom:8px">トーク</div>
        <div style="color:#666;font-size:13px;margin-bottom:28px">このアプリのファン同士で交流できる掲示板です。<br>まずニックネームを設定してください。</div>
        <input id="nick-input" type="text" maxlength="12" placeholder="ニックネーム（12文字以内）"
          style="width:100%;background:#1e1e1e;border:1px solid #444;border-radius:10px;padding:12px 14px;color:#fff;font-size:15px;font-family:inherit;margin-bottom:12px;outline:none;">
        <button onclick="window.saveNickname()" style="width:100%;background:var(--y);color:#1a1a1a;font-weight:900;font-size:15px;padding:13px;border-radius:12px;border:none;cursor:pointer;font-family:inherit">
          トークに参加する ⚽
        </button>
      </div>`;
    return;
  }

  const replyBanner = replyingTo ? `
    <div style="display:flex;align-items:center;justify-content:space-between;background:#1e1e1e;border:1px solid color-mix(in srgb,var(--y) 30%,transparent);border-radius:10px;padding:8px 12px;margin-bottom:8px">
      <span style="color:var(--y);font-size:12px">↩ <b>${escapeHtml(replyingTo.nick)}</b> さんへ返信中</span>
      <button onclick="window.cancelReply()" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1;">×</button>
    </div>` : '';

  root.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <span style="color:var(--y);font-weight:900;font-size:15px">💬 トーク</span>
        <span style="color:#555;font-size:11px;margin-left:8px">${communityPosts.length}件の投稿</span>
      </div>
      <button onclick="window.changeNickname()" style="display:flex;align-items:center;gap:6px;background:none;border:1px solid #333;border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer;font-family:inherit">
        <div style="width:22px;height:22px;background:${nickColor(nickname).bg};border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:11px;flex-shrink:0">${escapeHtml(nickname)[0]}</div>
        <span style="color:#888;font-size:11px">${escapeHtml(nickname)}</span>
      </button>
    </div>

    <div style="background:var(--card);border-radius:14px;padding:13px;margin-bottom:14px;border:1px solid color-mix(in srgb,var(--y) 25%,transparent)">
      ${replyBanner}
      <textarea id="post-input" placeholder="${replyingTo ? '返信を入力...' : 'レイソルについて語ろう！'}" maxlength="200"
        style="width:100%;background:#111;border:1px solid #333;border-radius:10px;padding:10px 12px;color:#fff;font-size:14px;font-family:inherit;resize:none;height:70px;outline:none;margin-bottom:10px;"></textarea>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span id="char-count" style="color:#555;font-size:11px">0 / 200</span>
        <button onclick="window.submitPost()" style="background:var(--y);color:#1a1a1a;font-weight:900;font-size:13px;padding:8px 20px;border-radius:10px;border:none;cursor:pointer;font-family:inherit">
          ${replyingTo ? '返信する' : '投稿する'}
        </button>
      </div>
    </div>

    ${communityPosts.length === 0
      ? `<div style="text-align:center;padding:32px;color:#444;font-size:13px">まだ投稿がありません。<br>最初の投稿をしてみよう！</div>`
      : communityPosts.map(p => renderPostCard(p)).join('')}`;

  const ta = document.getElementById('post-input');
  const cc = document.getElementById('char-count');
  if (ta && cc) ta.oninput = () => { cc.textContent = `${ta.value.length} / 200`; };
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.saveNickname = function() {
  const val = document.getElementById('nick-input')?.value?.trim();
  if (!val) return;
  nickname = val;
  localStorage.setItem('reysol_nickname', nickname);
  renderCommunityDOM();
};

window.changeNickname = function() {
  if (confirm(`ニックネームを変更しますか？\n現在: ${nickname}`)) {
    nickname = '';
    localStorage.removeItem('reysol_nickname');
    renderCommunityDOM();
  }
};

window.startReply = function(postId, nick, replyId) {
  replyingTo = { id: postId, nick, replyId: replyId || null };
  openReplies[postId] = true;
  renderCommunityDOM();
  setTimeout(() => document.getElementById('post-input')?.focus(), 80);
};

window.cancelReply = function() {
  replyingTo = null;
  renderCommunityDOM();
};

window.toggleReplies = function(postId) {
  openReplies[postId] = !openReplies[postId];
  // 返信を開いたら既読に
  if (openReplies[postId]) {
    lastReadReplyTs = Date.now();
    window.lastReadReplyTs = lastReadReplyTs;
    localStorage.setItem('reysol_last_read_reply_ts', lastReadReplyTs);
    window.unreadReplyCount = 0;
    if (window.renderNav) window.renderNav();
  }
  renderCommunityDOM();
};

window.submitPost = async function() {
  if (!currentUser) return alert('認証中です。しばらくお待ちください。');
  const ta = document.getElementById('post-input');
  const text = ta?.value?.trim();
  if (!text) return;
  if (text.length > 200) return;
  try {
    if (replyingTo) {
      await push(ref(db, `posts/${replyingTo.id}/replies`), {
        text, nick: nickname,
        uid: currentUser.uid,
        ts: serverTimestamp(),
        ...(replyingTo.replyId ? { replyToNick: replyingTo.nick } : {}),
      });
      openReplies[replyingTo.id] = true;
      replyingTo = null;
    } else {
      await push(ref(db, 'posts'), {
        text, nick: nickname,
        uid: currentUser.uid,
        ts: serverTimestamp(),
        likes: 0, likedBy: {}
      });
    }
    if (ta) ta.value = '';
    const cc = document.getElementById('char-count');
    if (cc) cc.textContent = '0 / 200';
  } catch(e) { alert('投稿に失敗しました。'); }
};

window.likePost = async function(postId) {
  if (!currentUser) return;
  const post = communityPosts.find(p => p.id === postId);
  if (!post) return;
  const alreadyLiked = (post.likedBy||{})[currentUser.uid];
  await update(ref(db, `posts/${postId}`), {
    likes: increment(alreadyLiked ? -1 : 1),
    [`likedBy/${currentUser.uid}`]: alreadyLiked ? null : true
  });
};

window.deletePost = async function(postId) {
  if (!currentUser) return;
  if (!confirm('この投稿を削除しますか？')) return;
  try {
    await remove(ref(db, `posts/${postId}`));
  } catch(e) { alert('削除に失敗しました。'); }
};

window.deleteReply = async function(postId, replyId) {
  if (!currentUser) return;
  if (!confirm('この返信を削除しますか？')) return;
  try {
    await remove(ref(db, `posts/${postId}/replies/${replyId}`));
  } catch(e) { alert('削除に失敗しました。'); }
};
</script>
